<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Quên mật khẩu - Shoppe Fashion</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <link th:href="@{/user/css/styles.css}" rel="stylesheet" />
    </head>
    <body class="d-flex flex-column min-vh-100 bg-light">
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
            <div class="container px-4 px-lg-5">
                <a class="navbar-brand fw-bolder" th:href="@{/}">Shoppe Fashion</a>
            </div>
        </nav>

        <div class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
            <div class="row w-100 justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card shadow border-0 rounded-lg">
                        <div class="card-header bg-dark text-white text-center py-3">
                            <h4 class="mb-0">Khôi Phục Mật Khẩu</h4>
                        </div>
                        <div class="card-body p-4">
                            <div class="text-center mb-4 text-muted small">
                                Nhập địa chỉ email của bạn và chúng tôi sẽ gửi cho bạn một liên kết để đặt lại mật khẩu.
                            </div>
                            
                            <div th:if="${error}" class="alert alert-danger text-center small" role="alert" th:text="${error}"></div>
                            <div th:if="${message}" class="alert alert-success text-center small" role="alert" th:text="${message}"></div>

                            <form th:action="@{/forgot-password}" method="post">
                                <div class="form-floating mb-4">
                                    <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                                    <label for="email">Địa chỉ Email đã đăng ký</label>
                                </div>
                                <div class="d-grid gap-2 d-md-flex justify-content-md-between">
                                    <a class="btn btn-outline-dark w-100 mb-2 mb-md-0 me-md-2" th:href="@{/login}">Quay lại đăng nhập</a>
                                    <button class="btn btn-dark w-100" type="submit">Gửi liên kết</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="py-4 bg-dark mt-auto">
            <div class="container"><p class="m-0 text-center text-white">Copyright &copy; Shoppe Fashion 2023</p></div>
        </footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
