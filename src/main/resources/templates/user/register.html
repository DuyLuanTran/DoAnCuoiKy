<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <title>Đăng ký - Shoppe Fashion</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <link th:href="@{/user/css/styles.css}" rel="stylesheet" />
    </head>
    <body class="d-flex flex-column min-vh-100 bg-light">
        <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
            <div class="container px-4 px-lg-5">
                <a class="navbar-brand fw-bolder" th:href="@{/}">Shoppe Fashion</a>
            </div>
        </nav>

        <div class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
            <div class="row w-100 justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card shadow border-0 rounded-lg">
                        <div class="card-header bg-dark text-white text-center py-3">
                            <h4 class="mb-0">Tạo Tài Khoản Mới</h4>
                        </div>
                        <div class="card-body p-4">
                            <div th:if="${error}" class="alert alert-danger text-center small" role="alert" th:text="${error}"></div>

                            <form th:action="@{/register}" th:object="${user}" method="post">
                                <div class="form-floating mb-3">
                                    <input type="text" class="form-control" id="username" th:field="*{username}" placeholder="Tên đăng nhập" required>
                                    <label for="username">Tên đăng nhập</label>
                                </div>
                                <div class="form-floating mb-3">
                                    <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="Email của bạn" required>
                                    <label for="email">Địa chỉ Email</label>
                                </div>
                                <div class="form-floating mb-4">
                                    <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Mật khẩu" required>
                                    <label for="password">Mật khẩu</label>
                                </div>
                                <div class="d-grid">
                                    <button class="btn btn-dark btn-lg" type="submit">Đăng Ký</button>
                                </div>
                            </form>
                        </div>
                        <div class="card-footer text-center py-3 bg-white">
                            <div class="small">Đã có tài khoản? <a th:href="@{/login}" class="text-decoration-none fw-bold">Đăng nhập</a></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="py-4 bg-dark mt-auto">
            <div class="container"><p class="m-0 text-center text-white">Copyright &copy; Shoppe Fashion 2023</p></div>
        </footer>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
