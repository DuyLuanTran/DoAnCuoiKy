<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title th:text="${product.name}">Chi tiết sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link th:href="@{/user/css/styles.css}" rel="stylesheet" />
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container px-4">
            <a class="navbar-brand" th:href="@{/}">Shoppe Fake</a>
            <a class="btn btn-outline-dark" th:href="@{/}">⬅ Quay lại trang chủ</a>
        </div>
    </nav>

    <section class="py-5">
        <div class="container px-4 px-lg-5 my-5">
            <div class="row gx-4 gx-lg-5 align-items-center">
                <div class="col-md-6">
                    <img class="card-img-top mb-5 mb-md-0" th:src="${product.image}" alt="Product Image" style="max-height: 500px; object-fit: contain;" />
                </div>
                <div class="col-md-6">
                    <div class="small mb-1" th:text="'Mã SP: ' + ${product.id}">ID</div>
                    <h1 class="display-5 fw-bolder" th:text="${product.name}">Tên sản phẩm</h1>
                    <div class="fs-5 mb-5">
                        <span class="text-danger fw-bold h3" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' đ'">0 đ</span>
                    </div>
                    <p class="lead" th:text="${product.description != null ? product.description : 'Sản phẩm chất lượng cao, cam kết chính hãng, bảo hành dài hạn.'}">Mô tả sản phẩm mẫu.</p>
                    <form th:action="@{/cart/add}" method="POST" class="d-flex">
                        <input type="hidden" name="productId" th:value="${product.id}">
                        <input class="form-control text-center me-3" id="inputQuantity" name="quantity" type="number" value="1" style="max-width: 3rem" />
                        <button class="btn btn-outline-danger flex-shrink-0" type="submit">
                            <i class="bi-cart-fill me-1"></i>
                            Thêm vào giỏ hàng
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-5 bg-dark ready-bottom">
        <div class="container"><p class="m-0 text-center text-white">Copyright &copy; Shoppe Fake 2024</p></div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
