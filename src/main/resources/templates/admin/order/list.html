<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>DASHMIN - Quản lý đơn hàng</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <link th:href="@{/img/favicon.ico}" rel="icon">
    <link th:href="@{/admin/lib/owlcarousel/assets/owl.carousel.min.css}" rel="stylesheet">
    <link th:href="@{/admin/lib/tempusdominus/css/tempusdominus-bootstrap-4.min.css}" rel="stylesheet" />
    <link th:href="@{/admin/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/admin/css/style.css}" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    
    <style>
        /* Tùy chỉnh thanh cuộn cho webkit (Chrome, Safari) */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #009CFF; 
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #007acc; 
        }
        
        /* Hiệu ứng hover cho Card */
        .order-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .order-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important;
        }
    </style>
</head>

<body>
    <div class="container-xxl position-relative bg-white d-flex p-0">
        <div class="sidebar pe-4 pb-3">
            <nav class="navbar bg-light navbar-light">
                <a th:href="@{/admin}" class="navbar-brand mx-4 mb-3">
                    <h3 class="text-primary"><i class="fa fa-hashtag me-2"></i>DASHMIN</h3>
                </a>

                <div class="d-flex align-items-center ms-4 mb-4">
                    <div class="position-relative">
                        <img class="rounded-circle" th:src="@{/admin/img/user.jpg}" alt="" style="width: 40px; height: 40px;">
                        <div class="bg-success rounded-circle border border-2 border-white position-absolute end-0 bottom-0 p-1"></div>
                    </div>
                    <div class="ms-3">
                        <h6 class="mb-0">Admin</h6>
                        <span>Quản trị viên</span>
                    </div>
                </div>
              <div class="navbar-nav w-100">
    <a th:href="@{/admin}" class="nav-item nav-link">
        <i class="fa fa-tachometer-alt me-2"></i>Dashboard
    </a>
    
    <a th:href="@{/admin/categories}" class="nav-item nav-link">
        <i class="fa fa-th me-2"></i>Danh mục
    </a>
    
    <a th:href="@{/admin/products}" class="nav-item nav-link">
        <i class="fa fa-box me-2"></i>Sản phẩm
    </a>
    
    <a th:href="@{/admin/users}" class="nav-item nav-link">
        <i class="fa fa-users me-2"></i>Người dùng
    </a>
    
    <a th:href="@{/admin/orders}" class="nav-item nav-link active">
        <i class="fa fa-shopping-cart me-2"></i>Đơn hàng
    </a>
</div>
            </nav>
        </div>
        <div class="content">
            <nav class="navbar navbar-expand bg-light navbar-light sticky-top px-4 py-0">
                <a href="#" class="navbar-brand d-flex d-lg-none me-4">
                    <h2 class="text-primary mb-0"><i class="fa fa-hashtag"></i></h2>
                </a>
                <a href="#" class="sidebar-toggler flex-shrink-0">
                    <i class="fa fa-bars"></i>
                </a>
                <div class="navbar-nav align-items-center ms-auto">
                    <div class="nav-item dropdown">
                        <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">
                            <img class="rounded-circle me-lg-2" th:src="@{/img/user.jpg}" alt="" style="width: 40px; height: 40px;">
                            <span class="d-none d-lg-inline-flex">Admin</span>
                        </a>
                        <div class="dropdown-menu dropdown-menu-end bg-light border-0 rounded-0 rounded-bottom m-0">
                            <a href="#" class="dropdown-item">Đăng xuất</a>
                        </div>
                    </div>
                </div>
            </nav>
            <div class="container-fluid pt-4 px-4">
                <div class="row g-4">
                    <div class="col-12">
                        <div class="bg-light rounded p-4 h-100">
                            
                            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
                                <h4 class="mb-3 mb-md-0"><i class="fa fa-list-alt text-primary me-2"></i>Quản lý đơn hàng</h4>
                                
                                <form th:action="@{/admin/orders}" method="get" class="d-flex w-100 w-md-auto" style="max-width: 400px;">
                                    <div class="input-group">
                                        <span class="input-group-text bg-white border-0"><i class="fa fa-search text-muted"></i></span>
                                        <input type="text" class="form-control border-0 bg-white" name="keyword" th:value="${keyword}" placeholder="Tìm SĐT hoặc trạng thái...">
                                        <button class="btn btn-primary" type="submit">Tìm</button>
                                        <a th:href="@{/admin/orders}" class="btn btn-secondary ms-1 rounded" th:if="${keyword != null and keyword != ''}"><i class="fa fa-times"></i></a>
                                    </div>
                                </form>
                            </div>

                            <div class="custom-scroll pe-2" style="max-height: 65vh; overflow-y: auto; overflow-x: hidden;">
                                
                                <div th:if="${#lists.isEmpty(orderPage.content)}" class="text-center py-5">
                                    <i class="fa fa-box-open fa-3x text-muted mb-3"></i>
                                    <h5 class="text-muted">Không tìm thấy đơn hàng nào</h5>
                                </div>

                                <div class="card border-0 shadow-sm mb-3 order-card" th:each="order : ${orderPage.content}">
                                    <div class="card-body">
                                        <div class="row align-items-center">
                                            
                                            <div class="col-12 col-md-3 mb-2 mb-md-0 d-flex align-items-center">
                                                <div class="bg-primary rounded-circle d-flex align-items-center justify-content-center text-white me-3" style="width: 50px; height: 50px;">
                                                    <i class="fa fa-shopping-bag fs-5"></i>
                                                </div>
                                                <div>
                                                    <small class="text-muted d-block">Mã Đơn</small>
                                                    <strong class="text-dark" th:text="${#strings.substring(order.id, 0, 8)} + '...'">#ORDERID</strong>
                                                </div>
                                            </div>

                                            <div class="col-12 col-md-3 mb-2 mb-md-0">
                                                <div class="mb-1">
                                                    <i class="fa fa-phone-alt text-primary me-2"></i>
                                                    <span th:text="${order.phone}">09xxxx</span>
                                                </div>
                                                <div>
                                                    <i class="far fa-clock text-primary me-2"></i>
                                                    <small class="text-muted" th:text="${#dates.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">Time</small>
                                                </div>
                                            </div>

                                            <div class="col-12 col-md-4 mb-3 mb-md-0 d-flex flex-column align-items-md-center justify-content-center">
                                                <h5 class="text-danger mb-1" th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 đ</h5>
                                                <div>
                                                    <span class="badge bg-warning rounded-pill px-3 py-2" th:if="${order.status == 'PENDING'}"><i class="fa fa-spinner fa-spin me-1"></i> Chờ xử lý</span>
                                                    <span class="badge bg-info rounded-pill px-3 py-2" th:if="${order.status == 'SHIPPING'}"><i class="fa fa-truck me-1"></i> Đang giao</span>
                                                    <span class="badge bg-success rounded-pill px-3 py-2" th:if="${order.status == 'COMPLETED'}"><i class="fa fa-check me-1"></i> Hoàn thành</span>
                                                    <span class="badge bg-danger rounded-pill px-3 py-2" th:if="${order.status == 'CANCELLED'}"><i class="fa fa-times me-1"></i> Đã hủy</span>
                                                </div>
                                            </div>

                                            <div class="col-12 col-md-2 text-md-end text-center">
                                                <a th:href="@{/admin/orders/{id}(id=${order.id})}" class="btn btn-outline-primary rounded-pill px-4">
                                                    Chi tiết <i class="fa fa-arrow-right ms-1"></i>
                                                </a>
                                            </div>

                                        </div>
                                    </div>
                                </div>
                                </div>
                            <nav th:if="${totalPages > 1}" class="mt-4 pt-3 border-top">
                                <ul class="pagination justify-content-center mb-0">
                                    <li class="page-item" th:classappend="${currentPage <= 1} ? 'disabled'">
                                        <a class="page-link" th:href="@{/admin/orders(page=${currentPage - 1}, keyword=${keyword})}">Trước</a>
                                    </li>
                                    <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i} ? 'active'">
                                        <a class="page-link" th:href="@{/admin/orders(page=${i}, keyword=${keyword})}" th:text="${i}">1</a>
                                    </li>
                                    <li class="page-item" th:classappend="${currentPage >= totalPages} ? 'disabled'">
                                        <a class="page-link" th:href="@{/admin/orders(page=${currentPage + 1}, keyword=${keyword})}">Sau</a>
                                    </li>
                                </ul>
                            </nav>

                        </div>
                    </div>
                </div>
            </div>

            <div class="container-fluid pt-4 px-4">
                <div class="bg-light rounded-top p-4">
                    <div class="row">
                        <div class="col-12 col-sm-6 text-center text-sm-start">
                            &copy; <a href="#">Shoppe Fake</a>, All Right Reserved. 
                        </div>
                    </div>
                </div>
            </div>
            </div>
        <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/admin/lib/chart/chart.min.js}"></script>
    <script th:src="@{/admin/lib/easing/easing.min.js}"></script>
    <script th:src="@{/admin/lib/waypoints/waypoints.min.js}"></script>
    <script th:src="@{/admin/lib/owlcarousel/owl.carousel.min.js}"></script>
    <script th:src="@{/admin/lib/tempusdominus/js/moment.min.js}"></script>
    <script th:src="@{/admin/lib/tempusdominus/js/moment-timezone.min.js}"></script>
    <script th:src="@{/admin/lib/tempusdominus/js/tempusdominus-bootstrap-4.min.js}"></script>
    <script th:src="@{/admin/js/main.js}"></script>
</body>
</html>
