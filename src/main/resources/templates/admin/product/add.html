<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>DASHMIN - Thêm sản phẩm</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <link th:href="@{/img/favicon.ico}" rel="icon">

    <link th:href="@{/admin/lib/owlcarousel/assets/owl.carousel.min.css}" rel="stylesheet">
    <link th:href="@{/admin/lib/tempusdominus/css/tempusdominus-bootstrap-4.min.css}" rel="stylesheet" />

    <link th:href="@{/admin/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/admin/css/style.css}" rel="stylesheet">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <!-- <div class="container-xxl position-relative bg-white d-flex p-0">
        <div id="spinner" class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
            <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                <span class="sr-only">Loading...</span>
            </div>
        </div> -->
        <div class="sidebar pe-4 pb-3">
            <nav class="navbar bg-light navbar-light">
                <a th:href="@{/admin/products}" class="navbar-brand mx-4 mb-3">
                    <h3 class="text-primary"><i class="fa fa-hashtag me-2"></i>DASHMIN</h3>
                </a>
                <div class="d-flex align-items-center ms-4 mb-4">
                    <div class="position-relative">
                        <img class="rounded-circle" th:src="@{/img/user.jpg}" alt="" style="width: 40px; height: 40px;">
                        <div class="bg-success rounded-circle border border-2 border-white position-absolute end-0 bottom-0 p-1"></div>
                    </div>
                    <div class="ms-3">
                        <h6 class="mb-0">Admin</h6>
                        <span>Quản trị viên</span>
                    </div>
                </div>
                <div class="navbar-nav w-100">
                    <a href="#" class="nav-item nav-link"><i class="fa fa-tachometer-alt me-2"></i>Dashboard</a>
                    <a th:href="@{/admin/categories}" class="nav-item nav-link"><i class="fa fa-th me-2"></i>Danh mục</a>
                    <a th:href="@{/admin/products}" class="nav-item nav-link active"><i class="fa fa-box me-2"></i>Sản phẩm</a>
                </div>
            </nav>
        </div>
        <div class="content">
            <nav class="navbar navbar-expand bg-light navbar-light sticky-top px-4 py-0">
                <a href="#" class="sidebar-toggler flex-shrink-0">
                    <i class="fa fa-bars"></i>
                </a>
            </nav>
            <div class="container-fluid pt-4 px-4">
                <div class="row g-4">
                    <div class="col-sm-12 col-xl-8 mx-auto">
                        <div class="bg-light rounded h-100 p-4">
                            <h4 class="mb-4">Thêm Sản Phẩm Mới</h4>
                            
                            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                            <form th:action="@{/admin/products/save}" th:object="${product}" method="post">
                                
                                <div class="mb-3">
                                    <label for="name" class="form-label">Tên sản phẩm <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="name" th:field="*{name}" required placeholder="Nhập tên sản phẩm...">
                                </div>
                                
                                <div class="mb-3">
                                    <label for="category" class="form-label">Danh mục <span class="text-danger">*</span></label>
                                    <select class="form-select" id="category" th:field="*{categoryId}" required>
                                        <option value="">-- Chọn danh mục --</option>
                                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                                    </select>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="price" class="form-label">Giá (VNĐ) <span class="text-danger">*</span></label>
                                        <input type="number" class="form-control" id="price" th:field="*{price}" required min="0" placeholder="0">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="quantity" class="form-label">Số lượng <span class="text-danger">*</span></label>
                                        <input type="number" class="form-control" id="quantity" th:field="*{quantity}" required min="0" placeholder="0">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="image" class="form-label">Link hình ảnh (URL)</label>
                                    <input type="text" class="form-control" id="image" th:field="*{image}" placeholder="https://...">
                                </div>

                                <div class="mb-3">
                                    <label for="description" class="form-label">Mô tả</label>
                                    <textarea class="form-control" id="description" th:field="*{description}" rows="4" placeholder="Mô tả chi tiết sản phẩm..."></textarea>
                                </div>
                                
                                <div class="mb-4 form-check form-switch">
                                    <input class="form-check-input" type="checkbox" role="switch" id="active" th:field="*{active}" checked>
                                    <label class="form-check-label" for="active">Cho phép hoạt động</label>
                                </div>
                                
                                <button type="submit" class="btn btn-success"><i class="fa fa-save"></i> Thêm mới</button>
                                <a th:href="@{/admin/products}" class="btn btn-secondary ms-2"><i class="fa fa-arrow-left"></i> Quay lại</a>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            <div class="container-fluid pt-4 px-4">
                <div class="bg-light rounded-top p-4">
                    <div class="row">
                        <div class="col-12 col-sm-6 text-center text-sm-start">
                            &copy; <a href="#">Shoppe Fake</a>, All Right Reserved. 
                        </div>
                    </div>
                </div>
            </div>
            </div>
        <a href="#" class="btn btn-lg btn-primary btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/admin/lib/chart/chart.min.js}"></script>
    <script th:src="@{/admin/lib/easing/easing.min.js}"></script>
    <script th:src="@{/admin/lib/waypoints/waypoints.min.js}"></script>
    <script th:src="@{/admin/lib/owlcarousel/owl.carousel.min.js}"></script>
    <script th:src="@{/admin/lib/tempusdominus/js/moment.min.js}"></script>
    <script th:src="@{/admin/lib/tempusdominus/js/moment-timezone.min.js}"></script>
    <script th:src="@{/admin/lib/tempusdominus/js/tempusdominus-bootstrap-4.min.js}"></script>
